name: updpkgsums

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
    paths:
      - '*/PKGBUILD'

jobs:
  updpkgsums:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Arch packaging tools
        run: |
          set -euxo pipefail

          pacman -Syu --noconfirm --needed pacman-contrib git sudo
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Find updated packages
        run: |
          set -euxo pipefail

          base_sha='${{ github.event.pull_request.base.sha }}'
          head_sha='${{ github.event.pull_request.head.sha }}'

          mapfile -t pkgdirs < <(
            git diff --name-only "$base_sha" "$head_sha" -- '*/PKGBUILD' \
              | xargs -r -n1 dirname \
              | sort -u
          )

          {
            echo 'pkgdirs<<EOF'
            printf '%s\n' "${pkgdirs[@]}"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Update checksums and .SRCINFO
        if: ${{ env.pkgdirs != '' }}
        run: |
          set -euxo pipefail

          for pkgbuild in $pkgdirs; do
            workpath="$GITHUB_WORKSPACE/$pkgbuild"
            buildroot="/home/builder/gh-action-$pkgbuild"

            install -d -o builder -g builder "$buildroot"
            cp -a "$workpath/." "$buildroot/"
            chown -R builder:builder "$buildroot"

            sudo -u builder bash -lc "
              set -euxo pipefail
              cd '$buildroot'
              updpkgsums
              makepkg --printsrcinfo > .SRCINFO
            "

            cp -f "$buildroot/PKGBUILD" "$workpath/PKGBUILD"
            cp -f "$buildroot/.SRCINFO" "$workpath/.SRCINFO"
          done

      - name: Commit
        if: ${{ env.pkgdirs != '' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          file_pattern: '*/PKGBUILD */.SRCINFO'
          commit_message: 'chore: refresh PKGBUILD checksums and SRCINFO'
          commit_user_name: JasonLandbridge
          commit_user_email: 15127381+JasonLandbridge@users.noreply.github.com
          commit_author: JasonLandbridge <15127381+JasonLandbridge@users.noreply.github.com>
