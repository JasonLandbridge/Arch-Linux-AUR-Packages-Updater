name: updpkgsums

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

jobs:
  updpkgsums:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      # In order to make sure that the git-auto-commit-action has the permissions to write to the repository
      # using the repository token, we have to add the write permissions to it.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Arch packaging tools
        run: |
          set -euxo pipefail

          pacman -Syu --noconfirm --needed pacman-contrib git sudo
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Find updated package
        run: |
          set -euxo pipefail

          echo "pkgbuild=$(git diff --name-only origin/main origin/${GITHUB_HEAD_REF} '*PKGBUILD' | head -1 | xargs dirname)" >> "$GITHUB_ENV"

      - name: Update checksums and .SRCINFO
        if: ${{ env.pkgbuild != '' }}
        run: |
          set -euxo pipefail

          workpath="$GITHUB_WORKSPACE/$pkgbuild"
          buildroot=/home/builder/gh-action

          rm -rf "$buildroot"
          install -d -o builder -g builder "$buildroot"

          cp -a "$workpath/." "$buildroot/"
          chown -R builder:builder "$buildroot"

          sudo -u builder bash -lc "
            set -euxo pipefail
            cd '$buildroot'
            updpkgsums
            makepkg --printsrcinfo > .SRCINFO
          "

          cp -f "$buildroot/PKGBUILD" "$workpath/PKGBUILD"
          cp -f "$buildroot/.SRCINFO" "$workpath/.SRCINFO"

      - name: Commit
        if: ${{ env.pkgbuild != '' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          file_pattern: '*/PKGBUILD */.SRCINFO'
          commit_user_name: JasonLandbridge
          commit_user_email: 15127381+JasonLandbridge@users.noreply.github.com
          commit_author: JasonLandbridge <15127381+JasonLandbridge@users.noreply.github.com>
